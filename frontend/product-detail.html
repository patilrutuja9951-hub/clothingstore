<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Product Detail | MH24</title>

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="with-footer">

    <header class="navbar">
        <a href="/index.html">Home</a>

        <div>
            <a href="/favourites.html">
                <i class="fa-solid fa-heart"></i>
                <span id="fav-count">0</span>
            </a>

            <a href="/cart.html">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </header>

    <section class="product-detail-page">

        <div class="detail-left">
            <img id="detail-img" src="" alt="Product image" width="300">
        </div>

        <div class="detail-right">

            <h2 id="detail-name">Product Name</h2>
            <h3 id="detail-price">₹0</h3>
            <p id="detail-desc">Product description will appear here.</p>

            <div class="size-section">
                <p>Select Size:</p>

                <div class="sizes">
                    <span onclick="selectSize(this)">S</span>
                    <span onclick="selectSize(this)">M</span>
                    <span onclick="selectSize(this)">L</span>
                    <span onclick="selectSize(this)">XL</span>
                </div>
            </div>

            <div class="qty-section">
                <button onclick="changeQtyDetail(-1)">−</button>
                <span id="detail-qty">1</span>
                <button onclick="changeQtyDetail(1)">+</button>
            </div>

            <button id="detail-add-btn" class="add-btn">
                ADD TO BAG
            </button>

            <button id="detail-fav-btn" class="fav-btn">
                <i id="fav-icon" class="fa-regular fa-heart"></i> Add to Favourite
            </button>

        </div>

    </section>

    <script src="/static/js/product-detail.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
    <script src="/static/js/main.js" defer></script>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    if (!window.location.href.includes('product-detail.html')) return;
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    const res = await fetch(`https://clothingstore-2-smeg.onrender.com/api/product/${id}/`);
                    if (!res.ok) return;
                    const data = await res.json();
                    const imgEl = document.getElementById('detail-img');
                    if (imgEl) imgEl.src = data.image || '/static/images/blacktee1.png';
                    if (imgEl) imgEl.onerror = () => imgEl.src = '/static/images/blacktee1.png';
                    const name = document.getElementById('detail-name'); if (name) name.innerText = data.name;
                    const price = document.getElementById('detail-price'); if (price) price.innerText = new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(data.price);
                    const desc = document.getElementById('detail-desc'); if (desc) desc.innerText = data.description;
                } catch (err) {
                    console.error('Inline product-detail fetch failed', err);
                }
            });
        </script>

    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 MH24Collection. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>

    <a href="/cart.html" class="mm-item" title="Cart" aria-label="Cart"><i class="fa-solid fa-cart-shopping"></i><span class="mm-badge" id="mm-cart-count">0</span></a>
    <a href="/profile.html" class="mm-item" title="Profile" aria-label="Profile"><i class="fa-solid fa-user"></i></a>
</nav>
