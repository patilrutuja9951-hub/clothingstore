<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>My Profile | MH24 Collection</title>

    <link rel="stylesheet" href="/static/css/style.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(to right,#2b0000,#8b0000,#2b0000);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .profile-container{
            width:100%;
            max-width:450px;
            background:#111;
            padding:35px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            text-align:center;
            color:white;
        }

        .profile-container h1{
            color:gold;
            margin-bottom:25px;
            font-size:36px;
        }

        .profile-info{
            text-align:left;
            margin-top:20px;
        }

        .profile-info label{
            color:gold;
            font-size:15px;
        }

        .profile-info p{
            background:#1e1e1e;
            padding:12px;
            border-radius:10px;
            margin-top:5px;
            margin-bottom:18px;
            color:#ddd;
        }

        .btn-group{
            display:flex;
            gap:15px;
            margin-top:25px;
        }

        .btn{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            text-decoration:none;
            color:white;
            font-weight:bold;
        }

        .edit-btn{
            background:rgb(88, 3, 20);
        }

        .edit-btn:hover{
            background:#ebc908;
        }

        .logout-btn{
            background:#333;
        }

        .logout-btn:hover{
            background:#555;
        }

        @media(max-width:500px){

            .profile-container{
                padding:25px;
            }

            .btn-group{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

    <div class="profile-container">

        <h1>My Profile</h1>

        <div class="profile-info">

            <label>Full Name</label>
            <p id="profile-name">Rutuja Patil</p>

            <label>Email Address</label>
            <p id="profile-email">patilrutuja9951@gmail.com</p>

            <label>Phone Number</label>
            <p id="profile-phone">9326598416</p>

            <label>Address</label>
            <p id="profile-address">Mumbai, Maharashtra</p>

        </div>

        <div class="btn-group">

            <a href="/editprofile.html" class="btn edit-btn">
                Edit Profile
            </a>

            <button type="button" class="btn logout-btn" onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
