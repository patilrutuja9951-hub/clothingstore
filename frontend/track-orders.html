<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Track Order | MH24 Collection</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .track-form {
            max-width: 480px;
            margin: 0 auto 30px;
            display: grid;
            gap: 15px;
        }

        .track-form label {
            color: #f7f7f7;
            font-size: 14px;
        }

        .track-form input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-size: 15px;
        }

        .track-form button {
            background: #8b0000;
            border: none;
            color: #fff;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .track-form button:hover {
            transform: translateY(-1px);
            background: #c40000;
        }

        .track-result {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            border-radius: 16px;
            color: #ddd;
            line-height: 1.6;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            margin-top: 12px;
        }

        .status-received { background: #1d3c2f; }
        .status-processing { background: #554e1d; }
        .status-shipped { background: #1d2955; }
        .status-out { background: #5f2f1d; }
        .status-delivered { background: #1d4f2f; }

        .status-step {
            margin-top: 16px;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .status-step strong {
            display: block;
            margin-bottom: 8px;
            color: #fff;
        }
    </style>
</head>

<body class="with-footer">

    <!-- NAVBAR -->
    <header class="navbar">

        <a href="index.html" class="logo">
            Home
        </a>

        <div class="nav-icons">

            <a href="favourites.html">
                <i class="fa-solid fa-heart"></i>
                <span id="fav-count">0</span>
            </a>

            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>

        </div>

    </header>


    <!-- PAGE CONTENT -->
    <div class="page-content">

        <section class="track-order-section">

            <h1>Track Your Order</h1>

            <p>Enter your Order ID and the email used at checkout to see the current status.</p>

            <form id="track-form" class="track-form">
                <label for="order-id">Order ID</label>
                <input type="text" id="order-id" placeholder="e.g. MH123456" required>

                <label for="track-email">Email Address</label>
                <input type="email" id="track-email" placeholder="you@example.com" required>

                <button type="submit">Track Order</button>
            </form>

            <div id="track-result" class="track-result">
                <p>Enter your order details above and click Track Order.</p>
            </div>

        </section>

    </div>


    <!-- FOOTER -->
    <footer class="footer">

        <p>
            © 2026 MH24Collection. All rights reserved.
        </p>

    </footer>

    <script src="/static/js/main.js" defer></script>
    <script src="/static/js/track-orders.js"></script>
</body>

</html>
